<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=https://dinero-coin.com/">
  <link rel="canonical" href="https://dinero-coin.com/">
  <title>Dinero Labs</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #5b6472;
      --line: #d9dee8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #f7f8fb;
      line-height: 1.5;
    }

    main {
      width: min(620px, calc(100% - 40px));
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      text-align: center;
      box-shadow: 0 18px 46px rgba(17, 24, 39, 0.12);
    }

    img {
      width: 64px;
      height: 64px;
      border-radius: 12px;
    }

    h1 {
      margin: 18px 0 8px;
      font-size: 34px;
      letter-spacing: 0;
    }

    p {
      margin: 0 auto 18px;
      color: var(--muted);
      max-width: 440px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 15px;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      font-weight: 730;
    }
  </style>
</head>
<body>
  <main>
    <img src="https://github.com/DineroLabs.png?size=128" alt="Dinero Labs logo">
    <h1>Dinero Labs</h1>
    <p>Redirecting to the official Dinero downloads, explorer, and operator guide.</p>
    <a href="https://dinero-coin.com/">Open dinero-coin.com</a>
  </main>
  <script>
    window.location.replace("https://dinero-coin.com/");
  </script>
</body>
</html>
